<div id="display">1.00x</div>
<button id="betBtn">Tikish (10 UC)</button>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const display = document.getElementById('display');

    socket.on('tick', (val) => {
        display.innerText = val + 'x';
    });

    socket.on('crash', (val) => {
        display.innerText = "CRASH: " + val + 'x';
    });
</script>
